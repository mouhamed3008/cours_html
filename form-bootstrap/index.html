<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <title>Document</title>
  </head>
  <body>
    <div
      class="d-flex page justify-content-center align-items-center p-3 min-vh-100"
    >
      <div class="card w-100 rounded-4 shadow border-0 p-4 login-card">
        <div class="text-center mb-4">
          <div
            class="logo d-flex align-items-center justify-content-center rounded-4 mx-auto"
          >
            <i class="fa-solid fa-bolt fs-3"></i>
          </div>

          <h4 class="mt-3 mb-1 text-primary">Welcome Back</h4>
          <p class="text-muted small mb-0">
            Sign in to your account to continue
          </p>
        </div>

        <form action="">
          <div class="mb-3">
            <label class="form-label small">Email address</label>

            <div class="input-group">
              <span class="input-group-text bg-white">
                <i class="fa-regular fa-user"></i>
              </span>

              <input
                type="email"
                class="form-control"
                placeholder="you@example.com"
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label small">Email address</label>

            <div class="input-group">
              <span class="input-group-text bg-white">
                <i class="fa-solid fa-lock"></i>
              </span>

              <input
                type="password"
                class="form-control"
                placeholder="********"
              />

              <span class="input-group-text bg-white">
                <i class="fa-solid fa-eye"></i>
              </span>
            </div>
          </div>

          <div class="d-flex justify-content-between">
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="remember" />
              <label class="form-check-label small" for="remember"
                >Remember me</label
              >
            </div>

            <a href="" class="text-decoration-none small text-primary">
              Forgot password?</a
            >
          </div>

          <button class="btn btn-primary w-100 mt-3 mb-3">Sign In</button>

          <div class="d-flex align-items-center gap-2 my-3">
            <hr class="flex-grow-1" />
            <span>OR</span>
            <hr class="flex-grow-1" />
          </div>

          <button class="btn btn-outline-dark w-100">
            <i class="fa-brands fa-google me-2"></i>
            Continue with Google
          </button>

          <p class="text-center mt-3">
            Don't have account ?
            <a href="" class="text-decoration-none fw-semi-bold text-primary"
              >Create One</a
            >
          </p>
        </form>
      </div>
    </div>
  </body>
</html>
